# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=wms
spring.datasource.username=postgres
spring.datasource.password=sara1102
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=wms

# ─── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=wms
spring.flyway.default-schema=wms
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# ─── SpringDoc / Swagger ──────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Logging (log4j2 config is in log4j2.xml) ────────────────────────────────
logging.config=classpath:log4j2.xml
